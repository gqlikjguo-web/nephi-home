<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>尼腓的家 後台 v2</title>
  <link rel="stylesheet" href="./style.css?v=20260701-system-check-1">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="mark">尼</div>
      <div>
        <h1>尼腓的家</h1>
        <p>後台管理 v2</p>
      </div>
    </div>
    <a class="front-link" href="../availability/">客人前台</a>
  </header>

  <main class="shell" id="app">
    <section class="panel" id="loginPanel">
      <h2>後台登入</h2>
      <label class="field">
        <span>密碼</span>
        <input id="passwordInput" type="password" autocomplete="current-password">
      </label>
      <button class="primary" id="loginButton" type="button">進入後台</button>
      <p class="hint" id="loginMessage"></p>
    </section>

    <section class="workspace hidden" id="adminPanel">
      <div class="monthbar">
        <button type="button" class="outline" id="prevMonth">上一月</button>
        <div>
          <label for="monthPicker">月份</label>
          <input id="monthPicker" type="month">
        </div>
        <button type="button" class="outline" id="nextMonth">下一月</button>
      </div>

      <section class="panel">
        <div class="section-head">
          <div>
            <h2>房型</h2>
            <p id="currentRoomLabel">目前正在修改：301雙人房附衛浴</p>
          </div>
          <button type="button" class="outline small" id="reloadMonth">重新讀取</button>
        </div>
        <div class="room-grid" id="roomButtons"></div>
      </section>

      <section class="panel">
        <div class="legend">
          <span><i class="dot available"></i>可訂</span>
          <span><i class="dot closed"></i>已關閉</span>
        </div>
        <div class="weekdays">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div class="calendar" id="calendarGrid"></div>
      </section>

      <section class="actions">
        <button type="button" class="outline" id="clearRoomMonth">清除此房型本月關閉</button>
        <button type="button" class="danger" id="closeMonth">關閉全部當月</button>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Health</p>
            <h2>系統檢查</h2>
            <p>檢查 Apps Script、Google Sheet 欄位與目前月份讀取狀態。</p>
          </div>
          <button type="button" class="outline small" id="runSystemCheck">開始檢查</button>
        </div>
        <div class="check-result" id="systemCheckResult">尚未檢查</div>
      </section>

      <section class="panel">
        <p class="eyebrow">Batch</p>
        <h2>批次匯入已訂日期</h2>
        <label class="checkline">
          <input id="resetBeforeBatch" type="checkbox" checked>
          <span>先把這個月份全部改為可訂，再套用下面已訂清單</span>
        </label>
        <label class="field">
          <span>已訂清單</span>
          <textarea id="batchText" rows="11" placeholder="範例：
7/1 301
7/3 包棟
7/5 301 302 401 402"></textarea>
        </label>
        <div class="batch-summary" id="batchSummary">尚未解析</div>
        <button type="button" class="primary" id="applyBatch">套用批次更新</button>
      </section>

      <section class="status" id="statusBox" aria-live="polite"></section>
      <p class="build" id="buildInfo">admin-v2 build 20260628-verified-1</p>
    </section>
  </main>

  <script src="./config.js?v=20260701-system-check-1"></script>
  <script src="./admin-v2.js?v=20260701-system-check-1"></script>
</body>
</html>
