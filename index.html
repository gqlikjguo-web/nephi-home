<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>尼腓的家｜價格資訊</title>
    <meta
      name="description"
      content="尼腓的家民宿房型、包棟與價格資訊。"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="site-header">
      <p class="eyebrow">Nephi Home</p>
      <h1>尼腓的家價格資訊</h1>
      <p class="intro">房型、包棟與目前開放月份整理，實際價格與房況仍以官方回覆為準。</p>
      <nav class="quick-nav" aria-label="價格分類">
        <a href="#room-price">只訂房間價格</a>
        <a href="#whole-house-price">包棟價格</a>
        <a href="#rooms-info">房型介紹</a>
        <a href="#whole-house-info">包棟介紹</a>
      </nav>
    </header>

    <main>
      <section class="price-section" id="room-price">
        <div class="section-title">
          <span>01</span>
          <h2>只訂房間價格</h2>
        </div>
        <img src="./images/room-price.jpg" alt="尼腓的家七月平日房型價格" />
      </section>

      <section class="price-section" id="whole-house-price">
        <div class="section-title">
          <span>02</span>
          <h2>包棟價格</h2>
        </div>
        <img src="./images/whole-house-price.jpg" alt="尼腓的家包棟價格" />
      </section>

      <section class="price-section" id="rooms-info">
        <div class="section-title">
          <span>03</span>
          <h2>房型介紹</h2>
        </div>
        <img src="./images/rooms-info.jpeg" alt="尼腓的家房型與設備介紹" />
      </section>

      <section class="price-section" id="whole-house-info">
        <div class="section-title">
          <span>04</span>
          <h2>包棟介紹</h2>
        </div>
        <img src="./images/whole-house-info.jpeg" alt="尼腓的家包棟住宿介紹" />
      </section>
    </main>

    <footer>
      <a class="line-button" href="https://line.me/R/ti/p/@846zghrc" target="_blank" rel="noopener">
        LINE 詢問訂房
      </a>
      <p>價格如有異動，依官方公告與 LINE 回覆為主。</p>
    </footer>
  </body>
</html>
