<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>尼腓的家訂房平台</title>
  <link rel="stylesheet" href="style.css?v=20260625c">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./" aria-label="回到房況查詢首頁">
      <span class="brand-mark">尼</span>
      <span>
        <strong>尼腓的家</strong>
        <small>訂房查詢平台</small>
      </span>
    </a>
    <a class="line-pill" href="https://line.me/R/ti/p/@846zghrc" target="_blank" rel="noopener">LINE 詢問</a>
  </header>

  <main class="page-shell">
    <section class="hero-panel">
      <p class="eyebrow">CHECK DATES</p>
      <h1>查詢住宿日期</h1>
      <p>選擇入住日期，就可以查看目前開放的房型。實際訂房仍以 LINE 人工確認與匯款完成為準。</p>
    </section>

    <section class="search-card" aria-labelledby="searchTitle">
      <h2 id="searchTitle">查詢空房</h2>
      <p id="oldSiteWarning" class="notice" hidden></p>
      <form id="searchForm" class="search-form">
        <label>
          <span>入住日期</span>
          <input id="checkIn" type="date" required>
        </label>
        <label>
          <span>房型需求</span>
          <select id="roomType">
            <option value="all">不限，顯示全部</option>
            <option value="double">雙人房</option>
            <option value="quad">四人房</option>
            <option value="room301">301雙人房附衛浴</option>
            <option value="room302">302四人房附衛浴</option>
            <option value="room401">401雙人房有浴缸</option>
            <option value="room402">402四人房有浴缸</option>
            <option value="wholeHouse">包棟四個房間</option>
          </select>
        </label>
        <button class="primary-button" type="submit">查詢空房</button>
      </form>
    </section>

    <section class="results-section" aria-labelledby="resultTitle">
      <p class="eyebrow">RESULTS</p>
      <h2 id="resultTitle">查詢結果</h2>
      <p id="resultSummary">請先選擇入住日期。</p>
      <div id="emptyState" class="empty-state" hidden>目前沒有符合條件的可詢問房型。</div>
      <div id="roomList" class="room-list"></div>
    </section>
  </main>

  <template id="roomCardTemplate">
    <article class="room-card">
      <div class="room-card-header">
        <div>
          <h3 class="room-name"></h3>
          <p class="room-description"></p>
        </div>
        <span class="status-badge">可詢問</span>
      </div>
      <div class="tag-list"></div>
      <div class="room-actions">
        <button class="secondary-button copy-button" type="button">複製詢問文字</button>
        <a class="primary-button line-button" href="https://line.me/R/ti/p/@846zghrc" target="_blank" rel="noopener">LINE 詢問</a>
      </div>
    </article>
  </template>

  <script src="config.js?v=20260625c"></script>
  <script src="script.js?v=20260625c"></script>
</body>
</html>
